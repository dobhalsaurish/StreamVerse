<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My List - Stream Verse</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #141414; color: white; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    .navbar {
      position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: space-between; padding: 0 50px; z-index: 100;
    }
    .navbar .logo { font-weight: 700; font-size: 24px; letter-spacing: 1px; color: #e50914; cursor: pointer; }
    .navbar .nav-links { display: flex; align-items: center; gap: 20px; }
    .navbar .nav-links a { font-size: 14px; color: #e5e5e5; font-weight: 500; transition: color 0.2s; }
    .navbar .nav-links a:hover { color: #fff; }
    .navbar .nav-links .active { color: white; font-weight: 700; }
    .navbar .user-profile { width:32px; height:32px; border-radius:4px; background:linear-gradient(135deg,#e50914 0%,#ff0022 100%); cursor: pointer; }

    .hero {
      padding-top: 100px;
      padding-left: 50px;
      padding-bottom: 30px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7), rgba(20,20,20,0.5), rgba(20,20,20,1));
    }
    .hero h1 { font-size: 3rem; font-weight: 700; margin-bottom: 5px; }
    .hero p { font-size: 1.1rem; color: #a3a3a3; }

    .content { padding: 0 50px 50px; }
    .row { margin-bottom: 40px; }
    .row h2 { font-size: 1.5rem; margin-bottom: 15px; border-left: 5px solid #e50914; padding-left: 10px; }
    .row-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      min-height: 250px;
    }

    .card {
      position: relative;
      width: 200px;
      min-height: 250px;
      background-color: #2c2c2c;
      background-size: cover;
      background-position: center;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }
    .card:hover {
      transform: scale(1.05);
      z-index: 10;
      box-shadow: 0 8px 30px rgba(229, 9, 20, 0.4);
    }
    .card .remove-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 20;
    }
    .card .remove-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }
    
    .empty-state, .loading-state {
        color: #888;
        font-size: 1.2rem;
        padding: 40px 0;
        width: 100%;
        text-align: center;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-box {
        background: #1e1e1e;
        color: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
        text-align: center;
    }
    .modal-box h3 { margin-bottom: 15px; font-size: 1.5rem; color: #e50914; }
    .modal-box p { margin-bottom: 25px; line-height: 1.5; }
    .modal-actions button {
        background-color: #e50914;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 0 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        font-weight: bold;
    }
    .modal-actions button:hover {
        background-color: #ff3344;
    }
    .modal-actions button.cancel {
        background-color: #444;
    }
    .modal-actions button.cancel:hover {
        background-color: #666;
    }

    @media (max-width: 1024px) {
        .navbar { padding: 0 20px; }
        .hero, .content { padding-left: 20px; padding-right: 20px; }
        .card { width: 180px; min-height: 225px; }
    }
    @media (max-width: 768px) {
        .navbar .nav-links { gap: 10px; }
        .navbar .nav-links a { font-size: 12px; }
        .hero { padding-top: 80px; }
        .hero h1 { font-size: 2rem; }
        .card { width: 140px; min-height: 175px; }
        .row-cards { justify-content: space-around; }
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">STREAM VERSE</div>
    <div class="nav-links">
      <a href="home.html">Home</a>
      <a href="TVshow.html">TV Shows</a>
      <a href="movie.html">Movies</a>
      <a href="mylist.html" class="active">My List</a>
      <a href="watchparty.html">Watch Party</a>
      <div class="user-profile" onclick="handleLogout()"></div>
    </div>
  </div>

  <div class="hero">
    <h1>My List</h1>
    <p>Your saved movies and TV shows from across the Stream Verse platform.</p>
  </div>

  <div class="content">
    <div class="row saved">
      <h2>Saved Movies & Shows</h2>
      <div class="row-cards" id="myListContainer">
        <div class="loading-state" id="loadingState">Loading your list...</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <div class="modal-actions" id="modalActions">
            <button class="confirm" id="modalConfirm">OK</button>
            <button class="cancel" id="modalCancel">Cancel</button>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://aenikubkzquqjbnwiojn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbmlrdWJrenF1cWpibndpb2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2NzQzOTUsImV4cCI6MjA3NzI1MDM5NX0.ymt7BEAdA9mjd4XERYGiRhJzzdmRbGpZXIROXM_bBzo';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    function showCustomModal(title, message, isConfirm = false) {
        return new Promise(resolve => {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;

            const confirmBtn = document.getElementById('modalConfirm');
            const cancelBtn = document.getElementById('modalCancel');

            if (isConfirm) {
                confirmBtn.textContent = 'Confirm';
                cancelBtn.style.display = 'inline-block';
            } else {
                confirmBtn.textContent = 'OK';
                cancelBtn.style.display = 'none';
            }

            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);
            const newCancelBtn = cancelBtn.cloneNode(true);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

            newConfirmBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
            };

            newCancelBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(false);
            };

            modal.style.display = 'flex';
        });
    }

    function createListItemCard(item) {
        const card = document.createElement('div');
        card.className = 'card';

        const posterUrl = item.poster || 'https://placehold.co/200x250/333333/ffffff?text=No+Poster';
        card.style.backgroundImage = `url(${posterUrl})`;

        card.onclick = () => showCustomModal('Item Details', `Title: ${item.title}\nType: ${item.type}`, false);

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '×';
        removeBtn.onclick = (e) => {
            e.stopPropagation();
            removeFromList(item.id, item.title);
        };

        card.appendChild(removeBtn);
        return card;
    }

    function renderMyList(listData) {
        const container = document.getElementById('myListContainer');
        container.innerHTML = '';

        if (listData.length === 0) {
            container.innerHTML = '<div class="empty-state">Your list is empty! Add movies or TV shows from the Home/Movies/TV Shows pages.</div>';
        } else {
            listData.forEach(item => {
                container.appendChild(createListItemCard(item));
            });
        }
    }

    async function loadMyList() {
    if (!currentUser) return;
    
    // Get a reference to the loading state element
    const loadingState = document.getElementById('loadingState');

    try {
        const { data, error } = await supabase
            .from('user_lists')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('added_at', { ascending: false });

        if (error) throw error;

        renderMyList(data || []);

    } catch (error) {
        console.error("Error loading list:", error);
        // Display the error message inside the container
        document.getElementById('myListContainer').innerHTML = `<div class="empty-state">Error loading list: ${error.message}</div>`;
        
    } finally {
        // This 'finally' block ensures this code runs 
        // regardless of whether the 'try' block succeeded or the 'catch' block ran.
        // We remove the loading element to clean up the container.
        if (loadingState) {
            loadingState.remove(); 
        }
    }
}

    async function removeFromList(itemId, title) {
        const confirmed = await showCustomModal(
            'Confirm Removal',
            `Are you sure you want to remove "${title}" from your list?`,
            true
        );

        if (!confirmed) return;

        try {
            const { error } = await supabase
                .from('user_lists')
                .delete()
                .eq('id', itemId);

            if (error) throw error;

            showCustomModal('Success', `${title} has been removed from your list.`);
            loadMyList();
        } catch (error) {
            console.error("Error removing item:", error);
            showCustomModal('Error', `Failed to remove ${title}: ${error.message}`);
        }
    }

    async function handleLogout() {
        const confirmed = await showCustomModal('Confirm Logout', 'Are you sure you want to sign out?', true);
        if (confirmed) {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }
    }

    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            window.location.href = 'index.html';
            return;
        }

        currentUser = session.user;
        loadMyList();

        // Set up realtime subscription
        supabase
            .channel('user_lists_changes')
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'user_lists',
                filter: `user_id=eq.${currentUser.id}`
            }, () => {
                loadMyList();
            })
            .subscribe();
    }

    window.onload = checkAuth;
  </script>
</body>
</html>
