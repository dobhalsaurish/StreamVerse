<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Stream Verse</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 1px;
      color: #e50914;
      cursor: pointer;
    }

    body::before {
      content: "";
      position: fixed;
      top:0; left:0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      opacity: 0.2;
      z-index: -1;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .signup-box {
      background: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
    }
    .signup-box h1 {
      font-size: 2rem;
      margin-bottom: 25px;
      text-align: left;
    }

    .signup-box input {
      width: 100%;
      padding: 15px;
      margin-bottom: 16px;
      border: none;
      border-radius: 4px;
      background: #333;
      color: #fff;
      font-size: 1rem;
    }
    .signup-box input::placeholder {
      color: #8c8c8c;
    }

    .signup-box button {
      width: 100%;
      padding: 15px;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .signup-box button:hover {
      background: #ff3344;
    }
    .signup-box button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .links {
      margin-top: 30px;
      font-size: 1rem;
      color: #8c8c8c;
      text-align: center;
    }
    .links a {
      color: #fff;
      font-weight: 500;
      transition: color 0.3s;
    }
    .links a:hover {
      text-decoration: underline;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-box {
        background: #1e1e1e;
        color: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
        text-align: center;
    }
    .modal-box h3 { margin-bottom: 15px; font-size: 1.5rem; color: #e50914; }
    .modal-box p { margin-bottom: 25px; line-height: 1.5; }
    .modal-actions button {
        background-color: #e50914;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 0 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        font-weight: bold;
    }
    .modal-actions button:hover {
        background-color: #ff3344;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">STREAM VERSE</div>
  </div>

  <div class="main-content">
    <div class="signup-box">
      <h1>Sign Up</h1>
      <form onsubmit="handleSignup(event)">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password (min. 6 characters)" required minlength="6">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <button type="submit" id="signupButton">Create Account</button>
      </form>
      <div class="links">
        Already have an account? <a href="index.html">Sign in now</a>.
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <div class="modal-actions" id="modalActions">
            <button class="confirm" id="modalConfirm">OK</button>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://aenikubkzquqjbnwiojn.supabase.co'; // Replace with your Supabase URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbmlrdWJrenF1cWpibndpb2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2NzQzOTUsImV4cCI6MjA3NzI1MDM5NX0.ymt7BEAdA9mjd4XERYGiRhJzzdmRbGpZXIROXM_bBzo'; // Replace with your Supabase Anon Key
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showCustomModal(title, message) {
        return new Promise(resolve => {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;

            const confirmBtn = document.getElementById('modalConfirm');
            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

            newConfirmBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
            };

            modal.style.display = 'flex';
        });
    }

    window.handleSignup = async function(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const signupButton = document.getElementById('signupButton');

      if (password !== confirmPassword) {
        showCustomModal('Sign Up Failed', 'Passwords do not match!');
        return;
      }
      
      signupButton.disabled = true;
      signupButton.textContent = 'Creating Account...';

      try {
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: name
            }
          }
        });

        if (error) throw error;

        await showCustomModal('Success', 'Account created successfully! Please check your email to confirm your account, then sign in.');
        window.location.href = 'index.html';
      } catch (error) {
        console.error("Sign Up Error:", error);
        let errorMessage = "An error occurred during signup.";
        
        if (error.message.includes('User already registered')) {
          errorMessage = 'This email address is already in use.';
        } else if (error.message) {
          errorMessage = error.message;
        }

        await showCustomModal('Sign Up Failed', errorMessage);
      } finally {
        signupButton.disabled = false;
        signupButton.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
