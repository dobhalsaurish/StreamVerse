<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Password - Stream Verse</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 1px;
      color: #e50914;
      cursor: pointer;
    }

    body::before {
      content: "";
      position: fixed;
      top:0; left:0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0.2;
      z-index: -1;
    }

    .form-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      padding: 20px;
    }

    .auth-form {
      background-color: rgba(0,0,0,0.85);
      padding: 60px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .auth-form h2 {
      font-size: 2em;
      margin-bottom: 25px;
      text-align: center;
      color: #e50914;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9em;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background-color: #333;
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-group input:focus {
      border-color: #e50914;
      background-color: #444;
    }

    .auth-form button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 6px;
      background-color: #e50914;
      color: white;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s, opacity 0.3s;
      margin-top: 10px;
    }

    .auth-form button:hover {
      background-color: #ff3d47;
    }
    .auth-form button:disabled {
      background-color: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Custom Modal styles (reused from index.html) */
    .custom-modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background-color: #2c2c2c;
        padding: 30px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .modal-content h3 {
        color: #e50914;
        margin-bottom: 15px;
    }
    .modal-buttons {
        margin-top: 20px;
    }
    .modal-buttons button {
        background-color: #e50914;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">STREAM VERSE</div>
  </div>

  <div class="form-container">
    <form class="auth-form" onsubmit="handlePasswordUpdate(event)" id="updateForm" style="display: none;">
      <h2>Set New Password</h2>
      <div class="input-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" required minlength="6">
      </div>
      <div class="input-group">
        <label for="confirmNewPassword">Confirm New Password</label>
        <input type="password" id="confirmNewPassword" required minlength="6">
      </div>
      
      <button type="submit" id="updateButton">Update Password</button>

      <p id="authStatus" style="color: #aaa; text-align: center; margin-top: 30px;">
        Checking recovery link...
      </p>
    </form>
    
  </div>

  <div id="customModal" class="custom-modal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button id="modalConfirm">OK</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script> 
  <script>
    const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
    
    // Re-use the modal function for consistent UI feedback
    function showCustomModal(title, message, isConfirmation = false) {
        return new Promise(resolve => {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            const confirmButton = document.getElementById('modalConfirm');

            // Simplified for this page, as we only need OK
            confirmButton.textContent = 'OK';
            const cancelButton = document.getElementById('modalCancel');
            if (cancelButton) cancelButton.remove();

            confirmButton.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
            };

            modal.style.display = 'flex';
        });
    }

    // Function to handle the password update
    window.handlePasswordUpdate = async function(event) {
        event.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmNewPassword = document.getElementById('confirmNewPassword').value;
        const updateButton = document.getElementById('updateButton');

        if (newPassword !== confirmNewPassword) {
            await showCustomModal('Update Failed', 'New passwords do not match.');
            return;
        }

        if (newPassword.length < 6) {
            await showCustomModal('Update Failed', 'Password must be at least 6 characters long.');
            return;
        }

        updateButton.disabled = true;
        updateButton.textContent = 'Updating...';

        try {
            // When the user clicks the reset link, Supabase logs them in temporarily.
            // We use updateUser to change their password while this temporary session is active.
            const { error } = await supabase.auth.updateUser({ 
                password: newPassword 
            });

            if (error) throw error;

            await showCustomModal('Success', 'Your password has been updated successfully! You can now sign in.');
            window.location.href = 'login.html'; // Redirect to login page

        } catch (error) {
            console.error("Password Update Error:", error);
            await showCustomModal('Update Failed', 'Failed to update password. Please try the reset process again.');
        } finally {
            updateButton.disabled = false;
            updateButton.textContent = 'Update Password';
        }
    }

    // On page load, check if the user is authenticated from the reset link
    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        const updateForm = document.getElementById('updateForm');
        const authStatus = document.getElementById('authStatus');

        if (session) {
            // If a session exists, the recovery token worked. Show the form.
            authStatus.textContent = 'Enter your new password below.';
            updateForm.style.display = 'block';
        } else {
            // If no session, the link is expired or invalid.
            authStatus.style.color = '#e50914';
            authStatus.textContent = 'Error: Password recovery link is expired or invalid. Please request a new one.';
        }
    };
  </script>
</body>
</html>
