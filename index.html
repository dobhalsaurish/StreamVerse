<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Stream Verse</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 1px;
      color: #e50914;
      cursor: pointer;
    }

    body::before {
      content: "";
      position: fixed;
      top:0; left:0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0.2;
      z-index: -1;
    }

    .form-container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      padding: 20px;
    }

    .auth-form {
      background-color: rgba(0,0,0,0.85);
      padding: 60px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .auth-form h2 {
      font-size: 2em;
      margin-bottom: 25px;
      text-align: center;
      color: #e50914;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9em;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background-color: #333;
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-group input:focus {
      border-color: #e50914;
      background-color: #444;
    }

    .auth-form button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 6px;
      background-color: #e50914;
      color: white;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s, opacity 0.3s;
      margin-top: 10px;
    }

    .auth-form button:hover {
      background-color: #ff3d47;
    }
    .auth-form button:disabled {
      background-color: #555;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .auth-form p {
      text-align: center;
      margin-top: 20px;
      font-size: 0.9em;
    }
    .auth-form p a {
      color: #e50914;
      text-decoration: none;
      font-weight: bold;
    }
    .auth-form p a:hover {
      text-decoration: underline;
    }

    /* Forgot Password Link Styling */
    .forgot-password {
        display: block;
        text-align: right;
        font-size: 0.85em;
        margin-top: -15px;
        margin-bottom: 15px;
    }
    .forgot-password a {
        color: #aaa;
        text-decoration: none;
        transition: color 0.2s;
    }
    .forgot-password a:hover {
        color: #e50914;
        text-decoration: underline;
    }


    /* Custom Modal styles */
    .custom-modal {
        display: none;
        position: fixed;
        z-index: 2000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background-color: #2c2c2c;
        padding: 30px;
        border-radius: 8px;
        width: 90%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    .modal-content h3 {
        color: #e50914;
        margin-bottom: 15px;
    }
    .modal-buttons {
        margin-top: 20px;
    }
    .modal-buttons button {
        background-color: #e50914;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

  </style>
</head>
<body>

  <div class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">STREAM VERSE</div>
    </div>

  <div class="form-container">
    <form class="auth-form" onsubmit="handleLogin(event)">
      <h2>Sign In</h2>
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
      </div>
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
      </div>
      <div class="forgot-password">
          <a href="#" onclick="handlePasswordReset()">Forgot Password?</a>
      </div>
      
      <button type="submit" id="loginButton">Sign In</button>

      <p>New to Stream Verse? <a href="signup.html">Sign up now.</a></p>
    </form>
  </div>

  <div id="customModal" class="custom-modal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button id="modalConfirm">OK</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script> 
  <script>
    const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

    function showCustomModal(title, message, isConfirmation = false) {
        return new Promise(resolve => {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;
            const confirmButton = document.getElementById('modalConfirm');

            confirmButton.textContent = isConfirmation ? 'Yes' : 'OK';
            if (isConfirmation) {
                // Add a "Cancel" button for confirmation dialogs
                let cancelButton = document.getElementById('modalCancel');
                if (!cancelButton) {
                    cancelButton = document.createElement('button');
                    cancelButton.id = 'modalCancel';
                    cancelButton.textContent = 'Cancel';
                    cancelButton.style.backgroundColor = '#555';
                    cancelButton.style.marginLeft = '10px';
                    document.querySelector('.modal-buttons').appendChild(cancelButton);
                }
                cancelButton.onclick = () => {
                    modal.style.display = 'none';
                    resolve(false);
                };
            } else {
                // Remove cancel button for simple alerts
                const cancelButton = document.getElementById('modalCancel');
                if (cancelButton) cancelButton.remove();
            }

            confirmButton.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
            };

            modal.style.display = 'flex';
        });
    }

    window.handleLogin = async function(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginButton = document.getElementById('loginButton');

      loginButton.disabled = true;
      loginButton.textContent = 'Signing In...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        await showCustomModal('Success', 'Login successful! Redirecting...', false);
        window.location.href = 'home.html';
      } catch (error) {
        console.error("Login Error:", error);
        let errorMessage = "An error occurred during login.";
        
        if (error.message.includes('Invalid login credentials')) {
          errorMessage = 'Invalid email or password.';
        } else if (error.message) {
          errorMessage = error.message;
        }

        await showCustomModal('Sign In Failed', errorMessage);
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = 'Sign In';
      }
    }

    // --- NEW: Password Reset Function ---
    window.handlePasswordReset = async function() {
        const emailInput = document.getElementById('email');
        const email = emailInput.value.trim();

        if (!email) {
            await showCustomModal('Password Reset', 'Please enter your email address in the field above.', false);
            emailInput.focus();
            return;
        }
        
        // Disable the email input and show loading state in the link itself for feedback
        const resetLink = document.querySelector('.forgot-password a');
        const originalText = resetLink.textContent;
        resetLink.textContent = 'Sending...';
        resetLink.style.pointerEvents = 'none';

        try {
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                 // IMPORTANT: Change 'http://localhost:8080/update-password.html' to the actual URL 
                 // where you will host your password update page.
                 // This must also be configured in your Supabase Auth Settings.
                 redirectTo: `${window.location.origin}/update-password.html` 
            });

            if (error) throw error;

            await showCustomModal(
                'Password Reset Email Sent', 
                `A password recovery email has been sent to ${email}. Please check your inbox and spam folder.`,
                false
            );

        } catch (error) {
            console.error('Password Reset Error:', error);
            await showCustomModal(
                'Password Reset Failed', 
                'Failed to send reset email. Please ensure the email is correct and try again.',
                false
            );
        } finally {
            resetLink.textContent = originalText;
            resetLink.style.pointerEvents = 'auto';
        }
    }


    // Check if user is already logged in
    window.onload = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'home.html';
      }
    }
  </script>
</body>
</html>
