<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Stream Verse</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #141414;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar .logo {
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 1px;
      color: #e50914;
      cursor: pointer;
    }

    body::before {
      content: "";
      position: fixed;
      top:0; left:0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      opacity: 0.2;
      z-index: -1;
    }

    .main-content {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.7);
      padding: 40px;
      border-radius: 8px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
    }
    .login-box h1 {
      font-size: 2rem;
      margin-bottom: 25px;
      text-align: left;
    }

    .login-box input {
      width: 100%;
      padding: 15px;
      margin-bottom: 16px;
      border: none;
      border-radius: 4px;
      background: #333;
      color: #fff;
      font-size: 1rem;
    }
    .login-box input::placeholder {
      color: #8c8c8c;
    }

    .login-box button {
      width: 100%;
      padding: 15px;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-box button:hover {
      background: #ff3344;
    }
    .login-box button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 0.85rem;
      color: #b3b3b3;
    }
    .options a {
      color: #b3b3b3;
      transition: color 0.3s;
    }
    .options a:hover {
      text-decoration: underline;
    }

    .signup {
      margin-top: 30px;
      font-size: 1rem;
      color: #8c8c8c;
    }
    .signup a {
      color: #fff;
      font-weight: 500;
      transition: color 0.3s;
    }
    .signup a:hover {
      text-decoration: underline;
    }

    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.75);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    .modal-box {
        background: #1e1e1e;
        color: white;
        padding: 30px;
        border-radius: 12px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.7);
        text-align: center;
    }
    .modal-box h3 { margin-bottom: 15px; font-size: 1.5rem; color: #e50914; }
    .modal-box p { margin-bottom: 25px; line-height: 1.5; }
    .modal-actions button {
        background-color: #e50914;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 0 10px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        font-weight: bold;
    }
    .modal-actions button:hover {
        background-color: #ff3344;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo" onclick="window.location.href='home.html'">STREAM VERSE</div>
  </div>

  <div class="main-content">
    <div class="login-box">
      <h1>Sign In</h1>
      <form onsubmit="handleLogin(event)">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="loginButton">Sign In</button>
      </form>
      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Need help?</a>
      </div>
      <div class="signup">
        New to Stream Verse? <a href="signup.html">Sign up now</a>.
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <div class="modal-actions" id="modalActions">
            <button class="confirm" id="modalConfirm">OK</button>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://aenikubkzquqjbnwiojn.supabase.co'; // Replace with your Supabase URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlbmlrdWJrenF1cWpibndpb2puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2NzQzOTUsImV4cCI6MjA3NzI1MDM5NX0.ymt7BEAdA9mjd4XERYGiRhJzzdmRbGpZXIROXM_bBzo'; // Replace with your Supabase Anon Key
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showCustomModal(title, message, redirect = false) {
        return new Promise(resolve => {
            const modal = document.getElementById('customModal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').textContent = message;

            const confirmBtn = document.getElementById('modalConfirm');
            const newConfirmBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

            newConfirmBtn.onclick = () => {
                modal.style.display = 'none';
                resolve(true);
                if (redirect) window.location.href = 'home.html';
            };

            modal.style.display = 'flex';
        });
    }

    window.handleLogin = async function(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginButton = document.getElementById('loginButton');

      loginButton.disabled = true;
      loginButton.textContent = 'Signing In...';

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        await showCustomModal('Success', 'Login successful! Redirecting...', true);
      } catch (error) {
        console.error("Login Error:", error);
        let errorMessage = "An error occurred during login.";
        
        if (error.message.includes('Invalid login credentials')) {
          errorMessage = 'Invalid email or password.';
        } else if (error.message) {
          errorMessage = error.message;
        }

        await showCustomModal('Sign In Failed', errorMessage);
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = 'Sign In';
      }
    }

    // Check if user is already logged in
    window.onload = async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'home.html';
      }
    };
  </script>
</body>
</html>
